<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="pages.thanks.title">Merci ! | Scotty Dev</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png?v=20260226c">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/images/favicon-64.png?v=20260226c">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png?v=20260226c">
  <link rel="stylesheet" href="/css/style.css?v=20260227a">
  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 120px 20px 40px;
    }
    .thanks-card {
      max-width: 680px;
      width: 100%;
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 56, 56, 0.25);
      border-radius: 16px;
      padding: 42px 24px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .thanks-card h1 {
      margin-bottom: 10px;
      color: #fff;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
    }
    .thanks-card p {
      color: var(--muted);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 16px; right: 16px; z-index: 2000;">
    <button id="lang-toggle" class="lang-toggle" type="button">FR / EN</button>
  </div>

  <main class="thanks-wrap">
    <section class="thanks-card" aria-labelledby="thanks-title">
      <h1 id="thanks-title" data-i18n="pages.thanks.heading">Merci pour votre message ✉️</h1>
      <p data-i18n="pages.thanks.message">Votre demande a bien été envoyée. Je vous répondrai rapidement.</p>
      <a href="/" class="glow-genz-button" style="text-decoration: none; display: inline-block;" data-i18n="pages.thanks.backHome">Retour à l'accueil</a>
    </section>
  </main>

  <button id="chatbot-toggle" class="chatbot-toggle" type="button" aria-label="Ouvrir le chatbot" aria-controls="chatbot-panel" aria-expanded="false">💬</button>

  <aside id="chatbot-panel" class="chatbot-panel" aria-label="Assistant du site" hidden>
    <div class="chatbot-header">
      <h3 data-i18n="chatbot.title">Assistant Scotty</h3>
      <button id="chatbot-close" class="chatbot-close" type="button" aria-label="Fermer le chatbot">✕</button>
    </div>
    <div id="chatbot-messages" class="chatbot-messages" aria-live="polite">
      <p class="chatbot-bubble chatbot-bubble-bot" data-i18n="chatbot.welcome">Salut 👋 Je peux répondre sur mon profil, mes projets et le contact.</p>
    </div>
    <div class="chatbot-quick-actions" aria-label="Questions rapides">
      <button class="chatbot-chip" type="button" data-question="Qui es-tu ?" data-i18n="chatbot.q1">Qui es-tu ?</button>
      <button class="chatbot-chip" type="button" data-question="Tu étudies quoi ?" data-i18n="chatbot.q2">Tu étudies quoi ?</button>
      <button class="chatbot-chip" type="button" data-question="Tes compétences ?" data-i18n="chatbot.q3">Tes compétences ?</button>
      <button class="chatbot-chip" type="button" data-question="Quels projets ?" data-i18n="chatbot.q4">Quels projets ?</button>
      <button class="chatbot-chip" type="button" data-question="Tu cherches une alternance ?" data-i18n="chatbot.q5">Tu cherches une alternance ?</button>
      <button class="chatbot-chip" type="button" data-question="Comment te contacter ?" data-i18n="chatbot.q6">Comment te contacter ?</button>
    </div>
    <form id="chatbot-form" class="chatbot-form">
      <label class="sr-only" for="chatbot-input" data-i18n="chatbot.label">Pose ta question</label>
      <input id="chatbot-input" type="text" placeholder="Pose une question..." data-i18n-placeholder="chatbot.placeholder" autocomplete="off">
      <button type="submit" data-i18n="chatbot.send">Envoyer</button>
    </form>
  </aside>

  <script src="/js/script.js?v=20260409e"></script>
</body>
</html>
